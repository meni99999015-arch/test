<!DOCTYPE html>

<title>מפת עץ – מושג (Concept)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;background:#1a1a2e;color:#eee;direction:rtl}
h1{text-align:center;padding:16px;font-size:1.4rem;color:#e0e0ff}
#controls{text-align:center;margin-bottom:8px}
#controls button{margin:3px;padding:6px 14px;border:none;border-radius:20px;cursor:pointer;font-size:.85rem;background:#2d2d5e;color:#ccd;transition:background .2s}
#controls button:hover,#controls button.active{background:#5555aa;color:#fff}
#tree{width:100%;max-width:960px;margin:0 auto;padding:0 12px}
.node{margin:2px 0}
.node-header{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:8px;cursor:pointer;transition:background .15s}
.node-header:hover{filter:brightness(1.15)}
.toggle{width:18px;height:18px;display:flex;align-items:center;justify-content:center;border-radius:4px;background:rgba(255,255,255,.15);font-size:.75rem;flex-shrink:0}
.label{font-size:.9rem;font-weight:500}
.meta{font-size:.75rem;opacity:.65;margin-right:auto}
.children{padding-right:24px;border-right:2px solid rgba(255,255,255,.1);margin-right:9px}
.level0>.node-header{background:#3a3a6e;font-size:1.1rem}
.level1>.node-header{background:#e63946cc}
.level1:nth-child(2)>.node-header{background:#457b9dcc}
.level1:nth-child(3)>.node-header{background:#2a9d8fcc}
.level1:nth-child(4)>.node-header{background:#e9c46acc}
.level1:nth-child(5)>.node-header{background:#f4a261cc}
.level1:nth-child(6)>.node-header{background:#6a4c93cc}
.level2>.node-header{background:rgba(255,255,255,.08)}
.level3>.node-header{background:rgba(255,255,255,.05);font-size:.82rem}
</style>
</head>
<body>
<h1>מפת עץ – מושג (Concept)</h1>
<div id="controls">
<button onclick="expandAll()" class="active">פתח הכל</button>
<button onclick="collapseAll()">סגור הכל</button>
</div>
<div id="tree"></div>

};
function buildNode(node,level){const div=document.createElement('div');div.className=`node level${level}`;const header=document.createElement('div');header.className='node-header';const hasChildren=node.children&&node.children.length>0;if(hasChildren){const tog=document.createElement('span');tog.className='toggle';tog.textContent='−';header.appendChild(tog)}const lbl=document.createElement('span');lbl.className='label';lbl.textContent=node.name;header.appendChild(lbl);if(node.url){const a=document.createElement('a');a.href=node.url;a.textContent='↗';a.style.cssText='color:#aaf;font-size:.75rem;margin-right:6px;text-decoration:none';a.target='_blank';header.appendChild(a)}div.appendChild(header);if(hasChildren){const children=document.createElement('div');children.className='children';node.children.forEach(c=>children.appendChild(buildNode(c,level+1)));div.appendChild(children);header.addEventListener('click',()=>{const open=children.style.display!=='none';children.style.display=open?'none':'block';header.querySelector('.toggle').textContent=open?'+':'−'})}
return div}
function expandAll(){document.querySelectorAll('.children').forEach(el=>el.style.display='block');document.querySelectorAll('.toggle').forEach(el=>el.textContent='−')}
function collapseAll(){document.querySelectorAll('.children').forEach(el=>el.style.display='none');document.querySelectorAll('.toggle').forEach(el=>el.textContent='+')}
document.getElementById('tree').appendChild(buildNode(data,0));
